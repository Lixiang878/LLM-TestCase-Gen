name: Bug report
description: Report a problem with llm-testcase-gen
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands / inputs to reproduce.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11"
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
